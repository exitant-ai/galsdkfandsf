<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TQQQ 무한순환 시뮬레이션 봇</title>
<style>
  :root{
    --bg:#0e1621; --panel:#17212b; --panel2:#1d2a36; --bubble-bot:#182533;
    --bubble-me:#2b5278; --txt:#e9eef3; --muted:#7d8e9e; --line:#23323f;
    --up:#2ec27e; --dn:#f0566e; --accent:#54a9eb; --gold:#e7b34a; --warn:#f5a623;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
  header{background:var(--panel);padding:10px 16px;display:flex;align-items:center;gap:10px;
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;}
  .ava{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#54a9eb,#2b5278);
    display:flex;align-items:center;justify-content:center;font-size:18px;}
  header .nm{font-weight:600;font-size:15px;}
  header .st{font-size:12px;color:var(--accent);}
  .prog{height:3px;background:var(--line);}
  .prog>i{display:block;height:100%;background:linear-gradient(90deg,#54a9eb,#2ec27e);width:0;transition:width .3s;}
  .log{flex:1;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;}
  .row.me{justify-content:flex-end;}
  .bub{max-width:84%;padding:9px 12px;border-radius:14px;font-size:13.5px;line-height:1.55;
    white-space:pre-wrap;word-break:break-word;animation:pop .18s ease;}
  .bub.bot{background:var(--bubble-bot);border-bottom-left-radius:4px;}
  .bub.me{background:var(--bubble-me);border-bottom-right-radius:4px;}
  .bub.day{background:var(--panel2);border:1px solid var(--line);max-width:93%;}
  .bub.alert{background:#1c2b1f;border:1px solid #2a5a3a;max-width:93%;}
  .bub.quarter{background:#2e1c1c;border:1px solid #5a2a2a;max-width:94%;}
  .bub.nag{background:#33291a;border:1px solid #6b4f1f;max-width:88%;}
  .bub.card{background:var(--panel2);border:1px solid var(--line);max-width:96%;}
  .bub b{color:#fff;}
  .up{color:var(--up);} .dn{color:var(--dn);} .gold{color:var(--gold);} .acc{color:var(--accent);} .warn{color:var(--warn);}
  .mut{color:var(--muted);font-size:12px;}
  @keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .statusbar{display:flex;justify-content:space-between;align-items:center;gap:8px;
    background:var(--panel);border-top:1px solid var(--line);padding:6px 14px;font-size:12px;}
  .statusbar .big{font-size:14px;font-weight:700;}
  .kb{background:var(--panel);border-top:1px solid var(--line);padding:10px;position:sticky;bottom:0;}
  .kb .q{font-size:12.5px;color:var(--muted);margin:2px 4px 8px;}
  .grid{display:grid;gap:7px;}
  .c1{grid-template-columns:1fr;} .c2{grid-template-columns:repeat(2,1fr);}
  .c3{grid-template-columns:repeat(3,1fr);} .c4{grid-template-columns:repeat(4,1fr);}
  .c5{grid-template-columns:repeat(5,1fr);}
  button.opt{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:9px;padding:11px 6px;font-size:14px;font-weight:600;cursor:pointer;transition:.12s;}
  button.opt:hover{background:#243341;border-color:var(--accent);}
  button.opt:active{transform:scale(.96);}
  button.go{background:linear-gradient(135deg,#2e9be6,#2b5278);border-color:transparent;color:#fff;}
  button.done{background:linear-gradient(135deg,#2ea864,#1f6b45);border-color:transparent;color:#fff;}
  button.qc{background:#2e1c1c;border-color:#5a2a2a;}
  button.qc.on{background:linear-gradient(135deg,#b34a4a,#7a2a2a);border-color:transparent;color:#fff;}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);}
  button.big{width:100%;border-radius:11px;padding:14px;font-size:15px;font-weight:700;border:none;
    color:#fff;background:linear-gradient(135deg,#2e9be6,#2b5278);cursor:pointer;}
  .custom{display:flex;gap:7px;margin-top:7px;}
  .custom input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:11px;font-size:14px;outline:none;}
  .sliderbox{padding:2px 2px 0;}
  .sval{text-align:center;font-size:34px;font-weight:800;color:#fff;line-height:1;margin:6px 0 12px;}
  .sval .suf{font-size:16px;color:var(--muted);margin-left:3px;font-weight:600;}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:7px;border-radius:6px;
    background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--pct,50%),#27384660 var(--pct,50%));outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;
    background:#fff;border:3px solid var(--accent);cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.45);}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;border:3px solid var(--accent);cursor:pointer;}
  .srow{display:flex;justify-content:space-between;margin-top:5px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0 9px;justify-content:center;}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:6px 13px;
    font-size:12.5px;cursor:pointer;color:var(--txt);transition:.12s;}
  .chip:hover{border-color:var(--accent);} .chip:active{transform:scale(.95);}
  .chip.rec{border-color:var(--gold);color:var(--gold);}
  .ef{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:6px 2px;}
  .ef label{font-size:13px;color:var(--muted);}
  .ef input{width:140px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:9px 11px;font-size:14px;text-align:right;outline:none;}
  .ef input:focus{border-color:var(--accent);}
  .chartwrap{margin:8px 0 2px;}
  canvas{width:100%;height:120px;display:block;border-radius:8px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:12px;margin-top:8px;}
  .stat{background:rgba(255,255,255,.04);border-radius:8px;padding:7px 8px;}
  .stat .v{font-size:14px;font-weight:700;}
  .lots{margin-top:7px;font-size:12px;}
  .lots .li{display:flex;justify-content:space-between;border-top:1px dashed var(--line);padding:3px 0;}
  hr.sep{border:none;border-top:1px solid var(--line);margin:8px 0;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="ava">🤖</div>
    <div style="flex:1"><div class="nm">무한순환 시뮬레이터 봇</div><div class="st" id="hstat">설정을 시작하세요</div></div>
  </header>
  <div class="prog"><i id="prog"></i></div>
  <div class="log" id="log"></div>
  <div class="statusbar" id="sbar" style="display:none">
    <span id="sbDate" class="mut">—</span>
    <span><span class="mut">총자산</span> <span class="big" id="sbTot">—</span> <span id="sbRet" class="mut"></span></span>
  </div>
  <div class="kb" id="kb"></div>
</div>

  $('prog').style.width=(stepIdx/STEPS.length*100)+'%';
  bubble(`<span class="mut">[${stepIdx+1}/${STEPS.length}]</span> ${s.q}`,'bot',false);
  renderKeyboard(s);
}

    const def=s.def!=null?s.def:s.min;

      `<div class="chips" id="chips"></div>`+

    (s.presets||[]).forEach(p=>{

/* ============================================================ 전략 엔진 */
function buildSeries(){
  const all=(DATASETS[cfg.ticker]||TQQQ_DATA),n=all.length;
  const days={1:252,3:756,5:1260,0:n}[cfg.period]||756;
  return all.slice(Math.max(0,n-days));
}
function freshEng(startPx){
  return {tradeCash:cfg.cap,vault:0,lots:[],realized:0,prevPx:startPx,
    peak:cfg.cap,storeBase:cfg.cap,curvePeak:cfg.cap,mdd:0,
    buyCnt:0,tpCnt:0,storeCnt:0,injCnt:0,quarterCnt:0,
    lastTotal:cfg.cap,curve:[cfg.cap]};
}
function holdingsVal(S,p){let v=0;for(const l of S.lots)v+=l.sh*p;return v;}
function costVal(S){let v=0;for(const l of S.lots)v+=l.sh*l.buyP;return v;}   // 증거금(보유원가)
function totalVal(S,p){return S.tradeCash+S.vault+holdingsVal(S,p);}
function avgPrice(S){let sh=0,c=0;for(const l of S.lots){sh+=l.sh;c+=l.sh*l.buyP;}return sh>0?c/sh:0;}

// 쿼터 매도 미리보기: 보유의 1/4을 익절가 높은 순으로 (상태 변경 X)
function quarterPlan(S){
  const totSh=S.lots.reduce((a,l)=>a+l.sh,0);
  let target=totSh*0.25;
  const order=[...S.lots].sort((a,b)=>b.tpP-a.tpP);
  const sell=[];
  for(const l of order){ if(target<=1e-9)break; const take=Math.min(l.sh,target);
    sell.push({buyP:l.buyP,tpP:l.tpP,sh:take}); target-=take; }
  return {sell, sellSh:sell.reduce((a,s)=>a+s.sh,0)};
}
// 쿼터 매도 실행: 익절가 높은 순으로 1/4 매도 → 현금 확보
function quarterSell(S,price){
  if(S.lots.length===0) return null;
  const plan=quarterPlan(S);
  let proceeds=0, prof=0, target=plan.sellSh;
  const order=[...S.lots].sort((a,b)=>b.tpP-a.tpP);
  for(const l of order){
    if(target<=1e-9) break;
    const take=Math.min(l.sh, target);
    proceeds+=take*price; prof+=take*(price-l.buyP);
    l.sh-=take; target-=take;
  }
  S.lots=S.lots.filter(l=>l.sh>1e-9);
  S.tradeCash+=proceeds; S.realized+=prof; S.quarterCnt++;
  return {soldSh:plan.sellSh, proceeds, prof, nLots:plan.sell.length};
}

function stepDay(S,price){
  const isUp=price>=S.prevPx; const ev=[];
  // 하락 마감일에만 매수. 현금 소진 시 쿼터. 상승일은 아무것도 안 함.
  if(!isUp){
    if(S.tradeCash<QEPS && S.lots.length>0){
      const q=quarterSell(S,price);
      if(q) ev.push(Object.assign({t:'quarter'},q));
    } else {
      let amt=Math.min(totalVal(S,price)*cfg.buyPct/100, S.tradeCash);
      if(amt>0.005){
        const sh=amt/price, tpP=price*(1+cfg.tpPct/100);
        S.lots.push({sh,buyP:price,tpP}); S.tradeCash-=amt; S.buyCnt++;
        ev.push({t:'buy',amt,sh,price,tpP});
      }
    }
  }
  let prof=0,sold=0,nlot=0;
  S.lots=S.lots.filter(l=>{ if(price>=l.tpP){
    S.tradeCash+=l.sh*price; prof+=l.sh*(price-l.buyP); sold+=l.sh*price; nlot++; S.tpCnt++; return false;
  } return true; });
  if(sold>0){S.realized+=prof; ev.push({t:'tp',sold,prof,nlot});}
  let tot=totalVal(S,price);
  if(S.storeBase>0 && tot>=S.storeBase*(1+cfg.sUp/100)){
    const m=S.tradeCash*cfg.sPct/100;
    if(m>0.005){S.tradeCash-=m;S.vault+=m;S.storeCnt++;ev.push({t:'store',m,grow:(tot/S.storeBase-1)*100});}
    S.storeBase=tot;
  }
  tot=totalVal(S,price);
  if(tot<=S.peak*(1-cfg.iDn/100) && S.vault>0.005){
    const m=S.vault*cfg.iPct/100; S.vault-=m;S.tradeCash+=m;S.injCnt++;
    ev.push({t:'inject',m,drop:(1-tot/S.peak)*100}); S.peak=totalVal(S,price);
  }
  tot=totalVal(S,price);
  if(tot>S.peak)S.peak=tot; if(tot>S.curvePeak)S.curvePeak=tot;
  const dd=(tot/S.curvePeak-1)*100; if(dd<S.mdd)S.mdd=dd;
  S.prevPx=price; S.lastTotal=tot; S.curve.push(tot);
  return {isUp,price,ev,total:tot,holdings:holdingsVal(S,price)};
}

let SIM=null;
const REMIND=['오후 7시','오후 8시','오후 9시','오후 10시','오후 11시'];

function startSim(resume){
  const series=buildSeries();
  if(!resume){
    DB={cfg:JSON.parse(JSON.stringify(cfg)), eng:freshEng(series[0][1]), i:0, phase:'await', remind:0, quarterDay:false, logArr:[]};
    log.innerHTML='';
    bubble(`🚀 <b>${cfg.ticker}</b> 시뮬레이션 시작 — ${dateK(series[0][0])} ~ ${dateK(series[series.length-1][0])} (${series.length}거래일)\n<span class="mut">시작 자산 ${fmt0(cfg.cap)} · 매일 ${cfg.alert} 세팅 알림</span>`);
  }
  SIM={series, S:DB.eng, i:DB.i, auto:false, timer:null, qChk:{c1:false,c2:false}};
  $('sbar').style.display='flex'; $('prog').style.width='100%';
  $('hstat').textContent='실전 미리보기 · 매일 세팅';
  syncBar();
  if(DB.phase==='done'){ finishSim(true); return; }
  postSetupAlert();
}

function postSetupAlert(){
  if(SIM.i>=SIM.series.length-1){ DB.phase='done'; saveDB(); finishSim(false); return; }
  DB.phase='await';
  const S=SIM.S, ref=S.prevPx;
  const totRef=totalVal(S,ref);
  const buyAmt=Math.min(totRef*cfg.buyPct/100, S.tradeCash);
  const nextDate=dateK(SIM.series[SIM.i+1][0]);
  const t=REMIND[Math.min(DB.remind,REMIND.length-1)];

  const isQuarter = S.tradeCash<QEPS && S.lots.length>0;
  DB.quarterDay = isQuarter;
  SIM.qChk={c1:false,c2:false};

  if(isQuarter){
    // 익절 지정가 매도 주문(=현재 증권사에 걸린 주문) 기준 취소 목록
    const plan=quarterPlan(S);
    const openByTp={}, sellByTp={};
    S.lots.forEach(l=>{const k=l.tpP.toFixed(2); openByTp[k]=(openByTp[k]||0)+l.sh;});
    plan.sell.forEach(s=>{const k=s.tpP.toFixed(2); sellByTp[k]=(sellByTp[k]||0)+s.sh;});
    const cancels=Object.entries(sellByTp).sort((a,b)=>b[0]-a[0]).map(([p,sh])=>{
      const open=openByTp[p]||sh; return {price:+p,open,sell:sh,remain:Math.max(0,open-sh)};
    });
    const cancelLines=cancels.map((c,idx)=>
      c.remain>0.0001
        ? `   ${idx+1}. ${pxf(c.price)} GTC매도 취소 (${shf(c.open)}) → ${shf(c.sell)} 시장가매도 / ${shf(c.remain)} 다시 GTC`
        : `   ${idx+1}. ${pxf(c.price)} GTC매도 취소 (${shf(c.open)}) → 전량 시장가매도`
    ).join('\n');

    bubble(
     `🔻 <b>[${t}] 쿼터 데이!</b> · ${nextDate} 장 — <b>매도만</b>\n`+
     `증거금 소진 → 추가 매수 없이 <b>보유의 1/4 = ${shf(plan.sellSh)}</b> 정리 (익절가 높은 순)\n`+
     `기준가(전일종가) ${pxf(ref)}\n\n`+
     `<b>① GTC 매도 주문을 높은 가격(맨 위)부터 모두 취소</b>\n`+cancelLines+`\n\n`+
     `<b>② 취소한 물량 합계 ${shf(plan.sellSh)}주를 시장가로 매도</b>\n`+
     `<b>③ 부분취소 건은 남은 수량만 다시 GTC 매도로 걸기</b>\n\n`+
     `<span class="mut">현금 ${fmt0(S.tradeCash)} · 금고 ${fmt0(S.vault)} · 보유 ${S.lots.length}묶음</span>`,'quarter');
    bubble(`🔻 <b>쿼터 주의!</b> 오늘은 사는 날이 아니라 <b>파는 날</b>이에요.\n아래 ① 취소 → ② 매도를 끝내고 두 칸을 체크한 뒤 '완료'를 누르세요.`,'nag');
  }else{
    let tpLines='';
    if(S.lots.length){
      const map={};
      S.lots.forEach(l=>{const k=l.tpP.toFixed(2); map[k]=(map[k]||0)+l.sh;});
      const arr=Object.entries(map).sort((a,b)=>a[0]-b[0]).slice(0,6);
      tpLines='\n📌 <b>익절 지정가 매도 (GTC 유지)</b>\n'+arr.map(([p,sh])=>`   · ${pxf(+p)} 에 ${shf(sh)}`).join('\n');
      if(Object.keys(map).length>6) tpLines+=`\n   · …외 ${Object.keys(map).length-6}개 가격대`;
    }
    bubble(
     `🔔 <b>[${t}] LOC 세팅 알림</b> · ${nextDate} 장\n`+
     `기준가(전일종가) <b>${pxf(ref)}</b>\n\n`+
     `🟢 <b>LOC 매수 (하락일만)</b>\n`+
     `   · LOC 지정가 = 전일종가 <b>${pxf(ref)}</b> 에 <b>${fmt(buyAmt)}</b> 매수\n`+
     `   · 종가가 ${pxf(ref)} 미만(하락)이면 체결 · 이상(상승)이면 미체결·자동만료`+
     tpLines+
     `\n\n<span class="mut">현금 ${fmt0(S.tradeCash)} · 금고 ${fmt0(S.vault)} · 보유 ${S.lots.length}묶음</span>\n`+
     `\n👉 증권사 앱에 위 주문 세팅하셨나요?`,'alert');
  }
  renderControls();
  saveDB();
}

function onSettingDone(){
  if(DB.phase!=='await') return;
  if(DB.quarterDay && !(SIM.qChk.c1 && SIM.qChk.c2)){
    bubble(`🔻 먼저 <b>① 지정가 취소</b>와 <b>② 전량 매도</b>를 체크해주세요.`,'nag'); return;
  }
  meBubble(DB.quarterDay?'✅ 취소+매도 완료':'✅ 세팅 완료했어요');
  DB.remind=0;
  SIM.i++; DB.i=SIM.i;
  const [d,price]=SIM.series[SIM.i];
  const r=stepDay(SIM.S,price);
  emitResult(d,r);
  syncBar();
  saveDB();
  if(SIM.i>=SIM.series.length-1){ DB.phase='done'; saveDB(); finishSim(false); return; }
  setTimeout(postSetupAlert,400);
}

function onRemind(){
  if(DB.phase!=='await') return;
  DB.remind++;
  const lvl=DB.remind;
  const what=DB.quarterDay?'쿼터(취소+매도)':'LOC 세팅';
  if(lvl<REMIND.length){
    bubble(`🔁 <b>[${REMIND[lvl]}] 리마인더</b> — 아직 <b>오늘 ${what}</b> 안 하셨어요.\n자기 전에 꼭 끝내주세요!`,'nag');
  }else{
    bubble(`⚠️ <b>마감 임박!</b> 지금 안 하면 오늘 매매를 놓쳐요. 빨리 ${what} 끝내고 '완료'를 누르세요.`,'nag');
  }
  saveDB();
}

function emitResult(d,r){
  const S=SIM.S;
  const trend=r.isUp?`<span class="up">▲ 상승마감</span>`:`<span class="dn">▼ 하락마감</span>`;
  let L=[`<b>📈 ${dateK(d)} 장 마감</b>  ${trend}  ${pxf(r.price)}`];
  const buy=r.ev.find(e=>e.t==='buy');
  const qt=r.ev.find(e=>e.t==='quarter');
  if(qt) L.push(`🔻 <b>쿼터 매도</b> ${shf(qt.soldSh)} (증거금 소진) <span class="up">+${fmt(qt.prof)}</span>\n   익절가 높은 순 ${qt.nLots}묶음 정리 → 현금 ${fmt(qt.proceeds)} 확보`);
  else L.push(buy?`🟢 <b>하락일 LOC 매수 ${pxf(buy.price)}</b> · ${fmt(buy.amt)} (${shf(buy.sh)}) → <b>GTC 익절가 ${pxf(buy.tpP)}</b> 걸기`:(r.isUp?`⚪ 상승마감 · 매수 없음`:`⚪ 매수 없음`));
  const tp=r.ev.find(e=>e.t==='tp');
  if(tp) L.push(`🎯 익절 매도 <span class="up">+${fmt(tp.prof)}</span> (${tp.nlot}묶음)`);
  const st=r.ev.find(e=>e.t==='store');
  if(st) L.push(`🏦 보관: 현금 <b>${fmt(st.m)}</b> 금고로 (+${st.grow.toFixed(1)}%)`);
  const inj=r.ev.find(e=>e.t==='inject');
  if(inj) L.push(`💧 투입: 금고 <b>${fmt(inj.m)}</b> 트레이딩으로 (−${inj.drop.toFixed(1)}%)`);
  L.push(`<span class="mut">총자산 ${fmt0(r.total)} · 현금 ${fmt0(S.tradeCash)} · 금고 ${fmt0(S.vault)} · 보유 ${S.lots.length}묶음</span>`);
  bubble(L.join('\n'),'day');
  while(log.children.length>90) log.removeChild(log.children[1]);
}

function execSilent(){
  if(SIM.i>=SIM.series.length-1) return false;
  SIM.i++; DB.i=SIM.i; DB.remind=0;
  const [d,price]=SIM.series[SIM.i];
  const r=stepDay(SIM.S,price); emitResult(d,r);
  return true;
}
function toggleAuto(){
  if(SIM.auto){stopAuto();return;}
  if(DB.phase==='done')return;
  SIM.auto=true; const b=$('bAuto'); if(b)b.textContent='멈춤 ⏸';
  SIM.timer=setInterval(()=>{ if(!execSilent()){stopAuto();DB.phase='done';saveDB();finishSim(false);} else {syncBar();} },500);
}
function stopAuto(){ if(!SIM)return; SIM.auto=false; clearInterval(SIM.timer);
  const b=$('bAuto'); if(b)b.textContent='자동 ⏩';
  if(DB.phase!=='done'){ saveDB(); postSetupAlert(); } }
function runToEnd(){
  stopAuto();
  while(SIM.i<SIM.series.length-1){
    SIM.i++; DB.i=SIM.i;
    const [d,price]=SIM.series[SIM.i]; const r=stepDay(SIM.S,price);
    if(SIM.i>=SIM.series.length-3) emitResult(d,r);
  }
  DB.remind=0; DB.phase='done'; syncBar(); saveDB(); finishSim(false);
}

/* ---------- 현황 (읽기) ---------- */
function showStatus(){
  const S=SIM.S; const day=SIM.series[SIM.i];
  const ret=(S.lastTotal/cfg.cap-1)*100;
  const pnl=holdingsVal(S,day[1])-costVal(S);
  let lotsHtml='';
  if(S.lots.length){
    const show=S.lots.slice(-6).reverse();
    lotsHtml='<div class="lots"><div class="mut">보유 묶음 (최근순)</div>'+
      show.map(l=>`<div class="li"><span>${l.isUp?'<span class="up">상승</span>':'<span class="dn">하락</span>'} ${shf(l.sh)} @ ${pxf(l.buyP)}</span><span class="mut">익절 ${pxf(l.tpP)}</span></div>`).join('')+
      (S.lots.length>6?`<div class="li mut">…외 ${S.lots.length-6}묶음</div>`:'')+'</div>';
  }
  const id='cv'+Date.now();
  bubble(
   `<b>📊 현황</b> · ${dateK(day[0])} (${SIM.i}/${SIM.series.length-1}일차)\n`+
   `<hr class="sep">`+
   `<div class="stats">`+
   `<div class="stat"><div class="mut">시작금</div><div class="v">${fmt0(cfg.cap)}</div></div>`+
   `<div class="stat"><div class="mut">총자산</div><div class="v">${fmt0(S.lastTotal)}</div></div>`+
   `<div class="stat"><div class="mut">수익률</div><div class="v ${ret>=0?'up':'dn'}">${ret>=0?'+':''}${ret.toFixed(1)}%</div></div>`+
   `<div class="stat"><div class="mut acc">현금잔고</div><div class="v acc">${fmt0(S.tradeCash)}</div></div>`+
   `<div class="stat"><div class="mut gold">금고</div><div class="v gold">${fmt0(S.vault)}</div></div>`+
   `<div class="stat"><div class="mut">증거금(원가)</div><div class="v">${fmt0(costVal(S))}</div></div>`+
   `<div class="stat"><div class="mut">현재손익</div><div class="v ${pnl>=0?'up':'dn'}">${pnl>=0?'+':''}${fmt0(pnl)}</div></div>`+
   `<div class="stat"><div class="mut">보유평가액</div><div class="v">${fmt0(holdingsVal(S,day[1]))}</div></div>`+
   `<div class="stat"><div class="mut">평단가</div><div class="v">${avgPrice(S)?pxf(avgPrice(S)):'-'}</div></div>`+
   `<div class="stat"><div class="mut">현재가</div><div class="v">${pxf(day[1])}</div></div>`+
   `<div class="stat"><div class="mut up">누적 익절</div><div class="v up">+${fmt0(S.realized)}</div></div>`+
   `<div class="stat"><div class="mut dn">MDD</div><div class="v dn">${S.mdd.toFixed(1)}%</div></div>`+
   `</div>`+
   `<div class="stat" style="margin-top:6px"><div class="mut">매수·익절·보관·투입·쿼터</div><div class="v">${S.buyCnt||0}/${S.tpCnt||0}/${S.storeCnt}/${S.injCnt}/${S.quarterCnt||0}회</div></div>`+
   lotsHtml+
   `<div class="chartwrap"><canvas id="${id}" width="440" height="120"></canvas></div>`,
   'card', false);
  drawChart($(id));
}

/* ---------- 현황 수정 (실제 계좌와 맞추기) ---------- */
function showEdit(){
  if(!SIM){return;}
  const S=SIM.S; const p=SIM.series[SIM.i][1];
  const qty=S.lots.reduce((a,l)=>a+l.sh,0);
  bubble(`✏️ <b>현황 수정</b> — 실제 증권사 계좌와 차이 나면 직접 맞춰주세요.\n<span class="mut">차이가 크지 않으면 안 바꿔도 됩니다. (현재가 ${pxf(p)} 기준 현재손익은 자동 계산)</span>`,'bot',false);
  kb.innerHTML='';
  const box=document.createElement('div');
  box.innerHTML=
   `<div class="ef"><label>현금잔고 (증거금)</label><input id="e_cash" type="number" step="0.01" value="${S.tradeCash.toFixed(2)}"></div>`+
   `<div class="ef"><label>금고 (보관현금)</label><input id="e_vault" type="number" step="0.01" value="${S.vault.toFixed(2)}"></div>`+
   `<div class="ef"><label>보유 수량 (주)</label><input id="e_qty" type="number" step="0.0001" value="${qty.toFixed(4)}"></div>`+
   `<div class="ef"><label>평단가 ($)</label><input id="e_avg" type="number" step="0.01" value="${avgPrice(S).toFixed(2)}"></div>`+
   `<div class="ef"><label>누적 확정익절 ($)</label><input id="e_real" type="number" step="0.01" value="${S.realized.toFixed(2)}"></div>`;
  kb.appendChild(box);
  const row=document.createElement('div');row.className='grid c2';row.style.marginTop='6px';
  row.innerHTML=`<button class="opt done" id="eSave">저장</button><button class="opt ghost" id="eCancel">취소</button>`;
  kb.appendChild(row);
  $('eSave').onclick=()=>applyStatusEdit({
    cash:+$('e_cash').value, vault:+$('e_vault').value, qty:+$('e_qty').value,
    avg:+$('e_avg').value, realized:+$('e_real').value });
  $('eCancel').onclick=()=>{ bubble('수정을 취소했어요.','bot',false); renderControls(); };
}
function applyStatusEdit(v){
  const S=SIM.S; const p=SIM.series[SIM.i][1];
  S.tradeCash=Math.max(0, v.cash||0);
  S.vault=Math.max(0, v.vault||0);
  S.realized=v.realized||0;
  const curQty=S.lots.reduce((a,l)=>a+l.sh,0);
  const tgtQty=Math.max(0, v.qty||0), tgtAvg=Math.max(0, v.avg||0);
  if(tgtQty<=1e-9){ S.lots=[]; }
  else if(S.lots.length===0){ S.lots=[{sh:tgtQty,buyP:tgtAvg||p,tpP:(tgtAvg||p)*(1+cfg.tpPct/100)}]; }
  else {
    const sScale=curQty>0?tgtQty/curQty:0;
    const curAvg=avgPrice(S); const pScale=(curAvg>0&&tgtAvg>0)?tgtAvg/curAvg:1;
    S.lots.forEach(l=>{ l.sh*=sScale; l.buyP*=pScale; l.tpP*=pScale; });
    S.lots=S.lots.filter(l=>l.sh>1e-9);
  }
  S.lastTotal=totalVal(S,p);
  syncBar(); saveDB();
  bubble(`✅ <b>현황 수정 완료</b>\n현금 ${fmt0(S.tradeCash)} · 금고 ${fmt0(S.vault)} · 보유 ${shf(S.lots.reduce((a,l)=>a+l.sh,0))} · 평단 ${avgPrice(S)?pxf(avgPrice(S)):'-'} · 총자산 <b>${fmt0(S.lastTotal)}</b>`,'card',false);
  if(DB.phase==='await') postSetupAlert(); else renderControls();
}

function drawChart(cv){
  if(!cv)return; const ctx=cv.getContext('2d'); const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
  const c=SIM.S.curve; if(c.length<2)return;
  const mn=Math.min(...c),mx=Math.max(...c),pad=6;
  const x=i=>pad+(W-2*pad)*i/(c.length-1), y=v=>H-pad-(H-2*pad)*(v-mn)/((mx-mn)||1);
  ctx.strokeStyle='#33485a';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pad,y(cfg.cap));ctx.lineTo(W-pad,y(cfg.cap));ctx.stroke();ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(x(0),y(c[0]));for(let i=1;i<c.length;i++)ctx.lineTo(x(i),y(c[i]));
  const up=c[c.length-1]>=cfg.cap; ctx.strokeStyle=up?'#2ec27e':'#f0566e';ctx.lineWidth=1.6;ctx.stroke();
  ctx.lineTo(x(c.length-1),H-pad);ctx.lineTo(x(0),H-pad);ctx.closePath();
  ctx.fillStyle=up?'rgba(46,194,126,.12)':'rgba(240,86,110,.12)';ctx.fill();
}

function syncBar(){
  const S=SIM.S; const ret=(S.lastTotal/cfg.cap-1)*100;
  $('sbDate').textContent=`${dateK(SIM.series[SIM.i][0])} · ${SIM.i}/${SIM.series.length-1}일`;
  $('sbTot').textContent=fmt0(S.lastTotal);
  $('sbRet').innerHTML=`<span class="${ret>=0?'up':'dn'}">${ret>=0?'+':''}${ret.toFixed(1)}%</span>`;
}

/* ---------- 컨트롤 바 ---------- */
function renderControls(){
  kb.innerHTML='';
  if(DB && DB.quarterDay && DB.phase==='await'){
    const note=document.createElement('div');note.className='q';
    note.innerHTML='🔻 <b>쿼터 데이</b> — 매수 없이 매도만! 아래 ①② 체크 후 완료';
    kb.appendChild(note);
    const qrow=document.createElement('div');qrow.className='grid c2';
    qrow.innerHTML=`<button class="opt qc" id="qc1">☐ ① 지정가 취소</button><button class="opt qc" id="qc2">☐ ② 전량 매도</button>`;
    kb.appendChild(qrow);
    const r1=document.createElement('div');r1.className='grid c2';r1.style.marginTop='7px';
    r1.innerHTML=`<button class="opt done" id="bDone">✅ 완료 ▶ 다음날</button><button class="opt" id="bRemind">⏰ 아직</button>`;
    kb.appendChild(r1);
    const r2=document.createElement('div');r2.className='grid c3';r2.style.marginTop='7px';
    r2.innerHTML=`<button class="opt" id="bAuto">자동 ⏩</button><button class="opt" id="bEnd">끝까지 ⏭</button><button class="opt go" id="bStat">📊 현황</button>`;
    kb.appendChild(r2);
    const r3=document.createElement('div');r3.className='grid c2';r3.style.marginTop='7px';
    r3.innerHTML=`<button class="opt go" id="bEdit">✏️ 현황수정</button><button class="opt ghost" id="bReset">↺ 새로</button>`;
    kb.appendChild(r3);
    const upd=()=>{ $('qc1').className='opt qc'+(SIM.qChk.c1?' on':''); $('qc1').textContent=(SIM.qChk.c1?'☑':'☐')+' ① 지정가 취소';
                    $('qc2').className='opt qc'+(SIM.qChk.c2?' on':''); $('qc2').textContent=(SIM.qChk.c2?'☑':'☐')+' ② 전량 매도'; };
    $('qc1').onclick=()=>{SIM.qChk.c1=!SIM.qChk.c1;upd();};
    $('qc2').onclick=()=>{SIM.qChk.c2=!SIM.qChk.c2;upd();};
    upd();
  } else {
    const r1=document.createElement('div');r1.className='grid c2';
    r1.innerHTML=`<button class="opt done" id="bDone">✅ 세팅완료 ▶ 다음날</button><button class="opt" id="bRemind">⏰ 아직 안 했어요</button>`;
    kb.appendChild(r1);
    const r2=document.createElement('div');r2.className='grid c3';r2.style.marginTop='7px';
    r2.innerHTML=`<button class="opt" id="bAuto">자동 ⏩</button><button class="opt" id="bEnd">끝까지 ⏭</button><button class="opt go" id="bStat">📊 현황</button>`;
    kb.appendChild(r2);
    const r3=document.createElement('div');r3.className='grid c2';r3.style.marginTop='7px';
    r3.innerHTML=`<button class="opt go" id="bEdit">✏️ 현황수정</button><button class="opt ghost" id="bReset">↺ 새로 시작</button>`;
    kb.appendChild(r3);
  }
  $('bDone').onclick=onSettingDone;
  $('bRemind').onclick=onRemind;
  $('bAuto').onclick=toggleAuto;
  $('bEnd').onclick=runToEnd;
  $('bStat').onclick=showStatus;
  $('bEdit').onclick=showEdit;
  $('bReset').onclick=()=>{ if(confirm('저장된 진행 상황을 삭제하고 처음부터 다시 시작할까요?')){clearDB();location.reload();} };
}

function finishSim(quiet){
  stopAuto();
  if(!quiet){
    const S=SIM.S; const ret=(S.lastTotal/cfg.cap-1)*100;
    const bh=cfg.cap*(SIM.series[SIM.series.length-1][1]/SIM.series[0][1]);
    bubble(
     `🏁 <b>시뮬레이션 완료!</b> (${SIM.series.length}거래일)\n\n`+
     `• 시작 ${fmt0(cfg.cap)} → 최종 <b>${fmt0(S.lastTotal)}</b>\n`+
     `• 수익률 <b class="${ret>=0?'up':'dn'}">${ret>=0?'+':''}${ret.toFixed(1)}%</b> · MDD <span class="dn">${S.mdd.toFixed(1)}%</span>\n`+
     `• 확정익절 <span class="up">+${fmt0(S.realized)}</span> · 금고 ${fmt0(S.vault)}\n`+
     `• 매수 ${S.buyCnt}회 · 익절 ${S.tpCnt}회\n`+
     `• 보관 ${S.storeCnt}회 / 투입 ${S.injCnt}회 / 쿼터 ${S.quarterCnt||0}회\n\n`+
     `<span class="mut">단순보유(B&H): ${fmt0(bh)} (${bh>=cfg.cap?'+':''}${((bh/cfg.cap-1)*100).toFixed(1)}%)</span>`,'card');
  }
  $('hstat').textContent='시뮬레이션 완료 🏁';
  kb.innerHTML='';
  const r=document.createElement('div');r.className='grid c3';
  r.innerHTML=`<button class="opt go" id="bStat2">📊 현황</button><button class="opt go" id="bEdit2">✏️ 수정</button><button class="opt ghost" id="bReset2">↺ 새 설정</button>`;
  kb.appendChild(r);
  $('bStat2').onclick=showStatus;
  $('bEdit2').onclick=showEdit;
  $('bReset2').onclick=()=>{clearDB();location.reload();};
}

/* ============================================================ 시작 / 복구 */
function greet(){
  bubble(`안녕하세요! 👋 <b>무한순환 매매 시뮬레이터</b>예요.\n실제 TQQQ 데이터로, 매일 자기 전에 LOC를 세팅하는 흐름을 그대로 미리 체험합니다.\n\n몇 가지만 설정할게요.`,'bot',false);
  setTimeout(askStep,500);
}

function boot(){
  const saved=loadDB();
  if(saved && saved.logArr){
    $('hstat').textContent='이전 진행 발견';
    const S=saved.eng; const ret=(S.lastTotal/saved.cfg.cap-1)*100;
    bubble(`👋 다시 오셨네요! <b>이전 진행 상황</b>이 저장돼 있어요.\n\n`+
      `• ${saved.i}일차 진행 · 총자산 <b>${fmt0(S.lastTotal)}</b> (${ret>=0?'+':''}${ret.toFixed(1)}%)\n`+
      `• 금고 ${fmt0(S.vault)} · 보유 ${S.lots.length}묶음 · 누적익절 +${fmt0(S.realized)}\n\n`+
      `이어서 진행할까요?`,'bot',false);
    kb.innerHTML='';
    const g=document.createElement('div');g.className='grid c1';
    g.innerHTML=`<button class="big" id="resume">▶ 이어서 하기</button>
      <button class="opt ghost" id="fresh" style="margin-top:7px">새로 시작 (저장 삭제)</button>`;
    kb.appendChild(g);
    $('resume').onclick=()=>{
      cfg=saved.cfg; DB=saved; DB.logArr=DB.logArr||[];
      log.innerHTML=''; DB.logArr.forEach(m=>bubble(m.h,m.c,false));
      bubble(`🔄 <b>복구 완료</b> — 잔고·평단·금고·익절내역 그대로 이어서 진행합니다.`,'bot',false);
      startSim(true);
    };
    $('fresh').onclick=()=>{clearDB();location.reload();};
  }else{
    greet();
  }
}
boot();
